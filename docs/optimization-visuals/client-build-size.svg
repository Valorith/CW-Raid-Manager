<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Client build and logo size reductions</title>
  <desc id="desc">Horizontal bar chart comparing baseline and optimized client build raw size, gzip size, and logo raw size.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 1; }
    .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
    .subtitle { font: 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #5b6472; }
    .label { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #273142; }
    .axis { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #6b7280; }
    .value { font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
    .note { font: 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #4b5563; }
    .baseline { fill: #64748b; }
    .optimized { fill: #1f9d8a; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .legend-text { font: 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #374151; }
    .badge { fill: #ecfdf5; stroke: #99d6c9; }
    .badge-text { font: 700 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #087064; }
  </style>
  <rect class="bg" width="980" height="560" />
  <rect class="panel" x="28" y="26" width="924" height="508" rx="8" />

  <text class="title" x="56" y="74">Client Build And Asset Size</text>
  <text class="subtitle" x="56" y="101">Baseline vs optimized build output. The logo compression carries the largest transfer and storage win.</text>

  <rect class="baseline" x="650" y="65" width="18" height="18" rx="3" />
  <text class="legend-text" x="676" y="79">Baseline</text>
  <rect class="optimized" x="760" y="65" width="18" height="18" rx="3" />
  <text class="legend-text" x="786" y="79">Optimized</text>

  <g transform="translate(250,142)">
    <line class="grid" x1="0" y1="0" x2="0" y2="296" />
    <line class="grid" x1="130" y1="0" x2="130" y2="296" />
    <line class="grid" x1="260" y1="0" x2="260" y2="296" />
    <line class="grid" x1="390" y1="0" x2="390" y2="296" />
    <line class="grid" x1="520" y1="0" x2="520" y2="296" />
    <text class="axis" x="-4" y="322" text-anchor="middle">0</text>
    <text class="axis" x="130" y="322" text-anchor="middle">2.5 MiB</text>
    <text class="axis" x="260" y="322" text-anchor="middle">5 MiB</text>
    <text class="axis" x="390" y="322" text-anchor="middle">7.5 MiB</text>
    <text class="axis" x="520" y="322" text-anchor="middle">10 MiB</text>

    <text class="label" x="-194" y="22">Total raw build</text>
    <rect class="baseline" x="0" y="6" width="498" height="22" rx="4" />
    <rect class="optimized" x="0" y="36" width="181" height="22" rx="4" />
    <text class="value" x="508" y="23">9.57 MiB</text>
    <text class="value" x="191" y="53">3.48 MiB</text>
    <rect class="badge" x="640" y="16" width="92" height="30" rx="15" />
    <text class="badge-text" x="686" y="36" text-anchor="middle">-64%</text>

    <text class="label" x="-194" y="126">Total gzip build</text>
    <rect class="baseline" x="0" y="110" width="367" height="22" rx="4" />
    <rect class="optimized" x="0" y="140" width="84" height="22" rx="4" />
    <text class="value" x="377" y="127">7.06 MiB</text>
    <text class="value" x="94" y="157">1.62 MiB</text>
    <rect class="badge" x="640" y="120" width="92" height="30" rx="15" />
    <text class="badge-text" x="686" y="140" text-anchor="middle">-77%</text>

    <text class="label" x="-194" y="230">Logo raw asset</text>
    <rect class="baseline" x="0" y="214" width="347" height="22" rx="4" />
    <rect class="optimized" x="0" y="244" width="30" height="22" rx="4" />
    <text class="value" x="357" y="231">6.67 MiB</text>
    <text class="value" x="40" y="261">0.57 MiB</text>
    <rect class="badge" x="640" y="224" width="92" height="30" rx="15" />
    <text class="badge-text" x="686" y="244" text-anchor="middle">-91%</text>
  </g>

  <text class="note" x="56" y="498">Measured artifact bytes: raw build -6,387,976 bytes; gzip build -5,705,198 bytes; logo -6,389,473 bytes.</text>
</svg>
